<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="XLIIs Dash">
<link rel="apple-touch-icon" href="icon.png">
<title>XLIIs Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a14;
    color: #33ff33;
    font-family: -apple-system, sans-serif;
    min-height: 100vh;
    padding: env(safe-area-inset-top) 16px 16px;
    -webkit-user-select: none;
    user-select: none;
  }

  /* CRT overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
    pointer-events: none;
    z-index: 1000;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 12px;
  }
  .header h1 {
    font-family: 'Courier New', monospace;
    font-size: 20px;
    letter-spacing: 2px;
    color: #33ff33;
  }
  .live-badge {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 12px;
    letter-spacing: 1px;
    font-weight: 600;
  }
  .live-badge.on { background: rgba(51,255,51,0.15); color: #33ff33; border: 1px solid rgba(51,255,51,0.3); }
  .live-badge.off { background: rgba(255,60,60,0.15); color: #ff4444; border: 1px solid rgba(255,60,60,0.3); }

  .last-updated {
    font-size: 11px;
    color: #1a6a1a;
    text-align: right;
    margin-bottom: 16px;
  }

  /* STAT CARDS */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: rgba(51,255,51,0.03);
    border: 1px solid rgba(51,255,51,0.1);
    border-radius: 12px;
    padding: 14px;
  }
  .stat-label {
    font-size: 11px;
    color: #1a6a1a;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: 'Courier New', monospace;
    font-size: 28px;
    color: #33ff33;
    line-height: 1;
  }
  .stat-sub {
    font-size: 11px;
    color: #1a8a1a;
    margin-top: 4px;
  }

  /* WIDE STAT */
  .stat-wide {
    grid-column: 1 / -1;
  }

  /* SECTION */
  .section {
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: #1a6a1a;
    letter-spacing: 2px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  /* CHART */
  .chart-container {
    background: rgba(51,255,51,0.02);
    border: 1px solid rgba(51,255,51,0.08);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
    min-height: 120px;
    position: relative;
  }
  .chart-label {
    font-size: 11px;
    color: #1a6a1a;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 80px;
  }
  .bar {
    flex: 1;
    background: rgba(51,255,51,0.3);
    border-radius: 2px 2px 0 0;
    min-height: 2px;
    position: relative;
  }
  .bar:hover { background: rgba(51,255,51,0.6); }
  .bar-label {
    position: absolute;
    bottom: -16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    color: #1a6a1a;
    white-space: nowrap;
  }

  /* LIST */
  .list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(51,255,51,0.06);
  }
  .list-item:last-child { border-bottom: none; }
  .list-rank {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: #1a6a1a;
    width: 24px;
  }
  .list-name {
    flex: 1;
    font-size: 14px;
    color: #22bb22;
    margin-left: 8px;
  }
  .list-value {
    font-family: 'Courier New', monospace;
    font-size: 14px;
    color: #33ff33;
  }

  /* COLLECTION BARS */
  .collection-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .collection-name {
    font-size: 12px;
    color: #1a8a1a;
    width: 100px;
    text-align: right;
    letter-spacing: 1px;
  }
  .collection-fill {
    flex: 1;
    height: 20px;
    background: rgba(51,255,51,0.08);
    border-radius: 4px;
    overflow: hidden;
  }
  .collection-fill-inner {
    height: 100%;
    background: rgba(51,255,51,0.3);
    border-radius: 4px;
    transition: width 0.5s;
  }
  .collection-count {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: #33ff33;
    width: 36px;
  }

  /* OFF STATE */
  .off-state {
    text-align: center;
    padding: 60px 20px;
    color: #1a6a1a;
  }
  .off-state h2 {
    font-family: 'Courier New', monospace;
    font-size: 18px;
    margin-bottom: 8px;
    color: #1a8a1a;
  }
  .off-state p {
    font-size: 14px;
    line-height: 1.5;
  }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 20px;
    color: #1a6a1a;
    font-size: 13px;
  }

  /* MOBILE */
  @media (min-width: 768px) {
    body { max-width: 600px; margin: 0 auto; padding: 20px; }
    .stats-grid { grid-template-columns: 1fr 1fr 1fr 1fr; }
  }
</style>
</head>

async function fetchData() {
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`
  };
  const res = await fetch(`${SUPABASE_URL}/rest/v1/gd_bootleg_listening_log?select=*&order=listened_date.desc&limit=1000`, { headers });
  return await res.json();
}

function getToday() {
  return new Date().toISOString().split('T')[0];
}

function formatDate(d) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dt = new Date(d + 'T00:00:00');
  return `${months[dt.getMonth()]} ${dt.getDate()}`;
}

function render(data) {
  if (!data || data.length === 0) {
    document.getElementById('plays-today').textContent = '0';
    document.getElementById('plays-total').textContent = '0';
    document.getElementById('shows-unique').textContent = '0';
    document.getElementById('active-days').textContent = '0';
    document.getElementById('daily-chart').innerHTML = '<div class="empty">No data yet</div>';
    document.getElementById('collection-bars').innerHTML = '<div class="empty">No data yet</div>';
    document.getElementById('top-shows').innerHTML = '<div class="empty">No data yet</div>';
    document.getElementById('recent-plays').innerHTML = '<div class="empty">No data yet</div>';
    return;
  }

  const today = getToday();

  // Top stats — use correct field names: show_identifier, show_date, show_venue, listened_date
  const playsToday = data.filter(d => d.listened_date && d.listened_date.startsWith(today)).length;
  const uniqueShows = new Set(data.map(d => d.show_identifier).filter(Boolean)).size;
  const uniqueDays = new Set(data.map(d => d.listened_date ? d.listened_date.split('T')[0] : null).filter(Boolean)).size;

  document.getElementById('plays-today').textContent = playsToday;
  document.getElementById('plays-total').textContent = data.length;
  document.getElementById('shows-unique').textContent = uniqueShows;
  document.getElementById('active-days').textContent = uniqueDays;

  // Daily chart (last 14 days)
  const dayCounts = {};
  data.forEach(d => {
    if (!d.listened_date) return;
    const day = d.listened_date.split('T')[0];
    dayCounts[day] = (dayCounts[day] || 0) + 1;
  });

  const days = [];
  for (let i = 13; i >= 0; i--) {
    const dt = new Date();
    dt.setDate(dt.getDate() - i);
    days.push(dt.toISOString().split('T')[0]);
  }

  const maxCount = Math.max(...days.map(d => dayCounts[d] || 0), 1);
  const chartEl = document.getElementById('daily-chart');
  chartEl.innerHTML = days.map(d => {
    const count = dayCounts[d] || 0;
    const height = Math.max((count / maxCount) * 100, 2);
    const label = formatDate(d);
    return `<div class="bar" style="height:${height}%" title="${label}: ${count}"><span class="bar-label">${d === today ? '▪' : ''}</span></div>`;
  }).join('');

  // Collection breakdown — look up collections from SHOW_COLLECTIONS map
  const collCounts = {};
  data.forEach(d => {
    const ident = d.show_identifier || '';
    const cases = SHOW_COLLECTIONS[ident] || [];
    cases.forEach(c => {
      collCounts[c] = (collCounts[c] || 0) + 1;
    });
  });

  const maxColl = Math.max(...Object.values(collCounts), 1);
  const barsEl = document.getElementById('collection-bars');
  barsEl.innerHTML = Object.entries(COLLECTIONS).map(([id, name]) => {
    const count = collCounts[id] || 0;
    const pct = maxColl > 0 ? (count / maxColl) * 100 : 0;
    return `<div class="collection-bar">
      <div class="collection-name">${name}</div>
      <div class="collection-fill"><div class="collection-fill-inner" style="width:${pct}%"></div></div>
      <div class="collection-count">${count}</div>
    </div>`;
  }).join('');

  // Top shows — use show_identifier, show_date, show_venue
  const showCounts = {};
  const showMeta = {};
  data.forEach(d => {
    const id = d.show_identifier || '';
    if (!id) return;
    showCounts[id] = (showCounts[id] || 0) + 1;
    if (!showMeta[id]) {
      showMeta[id] = { date: d.show_date || '', venue: d.show_venue || '' };
    }
  });

  const topShows = Object.entries(showCounts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 8);

  const topEl = document.getElementById('top-shows');
  if (topShows.length === 0) {
    topEl.innerHTML = '<div class="empty">No data yet</div>';
  } else {
    topEl.innerHTML = topShows.map(([id, count], i) => {
      const meta = showMeta[id] || {};
      const label = meta.date || id.substring(0, 20);
      return `<div class="list-item">
        <span class="list-rank">${i + 1}.</span>
        <span class="list-name">${label}${meta.venue ? ' — ' + meta.venue : ''}</span>
        <span class="list-value">${count}</span>
      </div>`;
    }).join('');
  }

  // Recent plays
  const recent = data.slice(0, 10);
  const recentEl = document.getElementById('recent-plays');
  if (recent.length === 0) {
    recentEl.innerHTML = '<div class="empty">No data yet</div>';
  } else {
    recentEl.innerHTML = recent.map(d => {
      const date = d.listened_date ? formatDate(d.listened_date) : '';
      const label = d.show_date || d.show_identifier || '';
      return `<div class="list-item">
        <span class="list-name">${label}${d.show_venue ? ' — ' + d.show_venue : ''}</span>
        <span class="list-value" style="font-size:11px; color:#1a6a1a;">${date}</span>
      </div>`;
    }).join('');
  }
}

async function init() {
  const badge = document.getElementById('live-badge');
  const offState = document.getElementById('off-state');
  const dashboard = document.getElementById('dashboard');

  if (!LIVE) {
    badge.textContent = 'OFF';
    badge.className = 'live-badge off';
    offState.style.display = 'block';
    dashboard.style.display = 'none';
    return;
  }

  badge.textContent = 'LIVE';
  badge.className = 'live-badge on';
  offState.style.display = 'none';
  dashboard.style.display = 'block';

  try {
    const data = await fetchData();
    render(data);
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    console.error(e);
  }

  // Refresh every 60 seconds
  setInterval(async () => {
    try {
      const data = await fetchData();
      render(data);
      document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    } catch (e) {}
  }, 60000);
}

init();
</script>
