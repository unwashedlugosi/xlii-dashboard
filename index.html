<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="XLIIs Dash">
<link rel="apple-touch-icon" href="icon.png">
<title>XLIIs Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a14;
    color: #33ff33;
    font-family: -apple-system, sans-serif;
    min-height: 100vh;
    padding: env(safe-area-inset-top) 12px 20px;
    -webkit-user-select: none;
    user-select: none;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 1000;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0 4px;
  }
  .header h1 {
    font-family: 'Courier New', monospace;
    font-size: 18px;
    letter-spacing: 2px;
  }
  .live-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    letter-spacing: 1px;
    font-weight: 600;
    background: rgba(51,255,51,0.15);
    color: #33ff33;
    border: 1px solid rgba(51,255,51,0.3);
  }
  .last-updated {
    font-size: 10px;
    color: #1a5a1a;
    text-align: right;
    margin-bottom: 12px;
  }

  /* NOW PLAYING — hero section */
  .now-playing {
    text-align: center;
    padding: 16px 12px;
    margin-bottom: 12px;
    border: 1px solid rgba(51,255,51,0.15);
    border-radius: 12px;
    background: rgba(51,255,51,0.02);
  }
  .np-count {
    font-family: 'Courier New', monospace;
    font-size: 32px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .np-label {
    font-size: 11px;
    color: #1a6a1a;
    letter-spacing: 2px;
  }
  .np-shows {
    margin-top: 8px;
    font-size: 13px;
    color: #1a8a1a;
    line-height: 1.5;
  }
  .np-empty {
    font-size: 13px;
    color: #1a4a1a;
    font-style: italic;
  }

  /* SHOW OF THE WEEK */
  .show-week {
    padding: 12px;
    margin-bottom: 12px;
    border: 1px solid rgba(51,255,51,0.1);
    border-radius: 10px;
    background: rgba(51,255,51,0.015);
    text-align: center;
  }
  .sw-label {
    font-size: 10px;
    color: #1a5a1a;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .sw-show {
    font-family: 'Courier New', monospace;
    font-size: 16px;
    color: #33ff33;
  }
  .sw-venue {
    font-size: 12px;
    color: #1a8a1a;
    margin-top: 2px;
  }
  .sw-plays {
    font-size: 11px;
    color: #1a6a1a;
    margin-top: 4px;
  }

  /* STAT CARDS */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .stat-card {
    background: rgba(51,255,51,0.02);
    border: 1px solid rgba(51,255,51,0.08);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
  }
  .stat-value {
    font-family: 'Courier New', monospace;
    font-size: 22px;
    color: #33ff33;
    line-height: 1;
  }
  .stat-label {
    font-size: 9px;
    color: #1a5a1a;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* FUNNEL */
  .funnel {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 12px;
    padding: 10px;
    border: 1px solid rgba(51,255,51,0.08);
    border-radius: 10px;
    background: rgba(51,255,51,0.015);
    font-family: 'Courier New', monospace;
    font-size: 14px;
  }
  .funnel-num { color: #33ff33; }
  .funnel-label { color: #1a5a1a; font-size: 10px; letter-spacing: 1px; }
  .funnel-arrow { color: #1a4a1a; font-size: 16px; }

  /* SECTION TITLES */
  .section-title {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #1a5a1a;
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  /* CHARTS */
  .chart-box {
    border: 1px solid rgba(51,255,51,0.06);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 12px;
    background: rgba(51,255,51,0.01);
  }
  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 60px;
  }
  .bar {
    flex: 1;
    background: rgba(51,255,51,0.25);
    border-radius: 2px 2px 0 0;
    min-height: 1px;
    transition: background 0.2s;
  }
  .bar:hover { background: rgba(51,255,51,0.5); }
  .bar-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
    font-size: 8px;
    color: #1a4a1a;
  }

  /* GROWTH LINE */
  .growth-chart {
    height: 50px;
    position: relative;
    margin-bottom: 12px;
  }
  .growth-svg {
    width: 100%;
    height: 100%;
  }

  /* COLLECTION BARS */
  .collection-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .coll-name {
    font-size: 10px;
    color: #1a6a1a;
    width: 80px;
    text-align: right;
    letter-spacing: 1px;
  }
  .coll-fill {
    flex: 1;
    height: 16px;
    background: rgba(51,255,51,0.06);
    border-radius: 3px;
    overflow: hidden;
  }
  .coll-fill-inner {
    height: 100%;
    background: rgba(51,255,51,0.25);
    border-radius: 3px;
    transition: width 0.5s;
  }
  .coll-count {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #33ff33;
    width: 28px;
  }

  /* LISTS */
  .list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid rgba(51,255,51,0.04);
    font-size: 13px;
  }
  .list-item:last-child { border-bottom: none; }
  .list-rank {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #1a5a1a;
    width: 20px;
  }
  .list-name {
    flex: 1;
    color: #1e9e1e;
    margin-left: 4px;
    font-size: 12px;
  }
  .list-val {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: #33ff33;
    margin-left: 8px;
  }

  .section { margin-bottom: 14px; }
  .empty { text-align: center; padding: 12px; color: #1a4a1a; font-size: 12px; }

  /* PEAK HOURS */
  .hours-chart {
    display: flex;
    align-items: flex-end;
    gap: 1px;
    height: 40px;
  }
  .hour-bar {
    flex: 1;
    background: rgba(51,255,51,0.2);
    border-radius: 1px 1px 0 0;
    min-height: 1px;
  }

  @media (min-width: 768px) {
    body { max-width: 600px; margin: 0 auto; }
    .stats-grid { grid-template-columns: repeat(6, 1fr); }
  }
</style>
</head>

  </div>
</div>

<!-- COLLECTIONS -->
<div class="section">
  <div class="section-title">By Collection</div>
  <div id="collection-bars"></div>
</div>

<!-- PEAK HOURS -->
<div class="section">

<!-- TOP SHOWS -->

</div>

const today = () => new Date().toISOString().split('T')[0];
const fmtDate = d => { const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; const dt = new Date(d+'T12:00:00'); return `${m[dt.getMonth()]} ${dt.getDate()}`; };

async function q(table, params='') {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, { headers: H });
  return r.json();
}

async function refresh() {
  // Fetch all data sources in parallel
  const [plays, nowPlaying, analytics] = await Promise.all([
    q('gd_bootleg_listening_log', 'select=*&order=listened_date.desc&limit=2000'),
    q('gd_bootleg_now_playing', 'select=*').catch(() => []),
    q('xlii_analytics', 'select=*&order=created_at.desc&limit=5000').catch(() => [])
  ]);

  const t = today();

  // NOW PLAYING
  const fiveMinAgo = new Date(Date.now() - 5*60*1000).toISOString();
  const active = (nowPlaying || []).filter(n => n.updated_at && n.updated_at > fiveMinAgo);
  document.getElementById('np-count').textContent = active.length;
  const npShows = document.getElementById('np-shows');
  if (active.length > 0) {
    npShows.innerHTML = active.map(n => {
      const date = n.show_date || '';
      const venue = n.show_venue || '';
      const track = n.track_name || '';
      return `<div>${fmtDate(date)} — ${venue}${track ? ' · ' + track : ''}</div>`;
    }).join('');
    npShows.className = 'np-shows';
  } else {
    npShows.textContent = 'No active listeners';
    npShows.className = 'np-shows np-empty';
  }

  // STATS
  const playsToday = plays.filter(d => d.listened_date && d.listened_date.startsWith(t)).length;
  const uniqueShows = new Set(plays.map(d => d.show_identifier).filter(Boolean)).size;
  const playDays = [...new Set(plays.map(d => d.listened_date ? d.listened_date.split('T')[0] : null).filter(Boolean))].sort();
  const uniqueDays = playDays.length;

  // Streak — consecutive days ending today (or yesterday)
  let streak = 0;
  if (playDays.length > 0) {
    const check = new Date();
    for (let i = 0; i < 365; i++) {
      const d = check.toISOString().split('T')[0];
      if (playDays.includes(d)) {
        streak++;
        check.setDate(check.getDate() - 1);
      } else if (i === 0) {
        // today might not have plays yet, check yesterday
        check.setDate(check.getDate() - 1);
      } else {
        break;
      }
    }
  }

  // Unique devices
  const devices = new Set((analytics || []).filter(a => a.event === 'app_open').map(a => a.device_id).filter(Boolean)).size;

  document.getElementById('s-today').textContent = playsToday;
  document.getElementById('s-total').textContent = plays.length;
  document.getElementById('s-shows').textContent = uniqueShows;
  document.getElementById('s-devices').textContent = devices || '—';
  document.getElementById('s-days').textContent = uniqueDays;
  document.getElementById('s-streak').textContent = streak > 0 ? streak + 'd' : '—';

  // FUNNEL
  const opens = (analytics || []).filter(a => a.event === 'app_open').length;
  const playEvents = (analytics || []).filter(a => a.event === 'show_play').length;
  const rate = opens > 0 ? Math.round((playEvents / opens) * 100) + '%' : '—';
  document.getElementById('f-opens').textContent = opens || '—';
  document.getElementById('f-plays').textContent = playEvents || '—';
  document.getElementById('f-rate').textContent = rate;

  // SHOW OF THE WEEK
  const weekAgo = new Date(Date.now() - 7*24*60*60*1000).toISOString().split('T')[0];
  const weekPlays = plays.filter(d => d.listened_date && d.listened_date >= weekAgo);
  const weekCounts = {};
  weekPlays.forEach(d => { weekCounts[d.show_identifier] = (weekCounts[d.show_identifier] || 0) + 1; });
  const weekTop = Object.entries(weekCounts).sort((a,b) => b[1]-a[1])[0];
  const swEl = document.getElementById('show-week');
  if (weekTop && weekTop[1] > 1) {
    const meta = weekPlays.find(d => d.show_identifier === weekTop[0]);
    document.getElementById('sw-show').textContent = meta?.show_date ? fmtDate(meta.show_date) + ', ' + (meta.show_date?.split('-')[0] || '') : weekTop[0];
    document.getElementById('sw-venue').textContent = meta?.show_venue || '';
    document.getElementById('sw-plays').textContent = weekTop[1] + ' plays this week';
    swEl.style.display = 'block';
  } else {
    swEl.style.display = 'none';
  }

  // DAILY CHART
  const dayCounts = {};
  plays.forEach(d => { if (d.listened_date) { const day = d.listened_date.split('T')[0]; dayCounts[day] = (dayCounts[day]||0)+1; }});
  const days = [];
  for (let i = 13; i >= 0; i--) { const dt = new Date(); dt.setDate(dt.getDate()-i); days.push(dt.toISOString().split('T')[0]); }
  const maxDay = Math.max(...days.map(d => dayCounts[d]||0), 1);
  document.getElementById('daily-chart').innerHTML = days.map(d => {
    const c = dayCounts[d]||0;
    return `<div class="bar" style="height:${Math.max((c/maxDay)*100,2)}%" title="${fmtDate(d)}: ${c}"></div>`;
  }).join('');

  // CUMULATIVE GROWTH
  const growthEl = document.getElementById('growth-chart');
  if (plays.length > 0) {
    const sorted = [...plays].sort((a,b) => (a.listened_date||'').localeCompare(b.listened_date||''));
    const points = sorted.map((d,i) => ({ x: i, y: i+1 }));
    const maxX = points.length - 1 || 1;
    const maxY = points.length;
    const svgPoints = points.map(p => `${(p.x/maxX)*100},${100-(p.y/maxY)*100}`).join(' ');
    growthEl.innerHTML = `<svg class="growth-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
      <polyline points="${svgPoints}" fill="none" stroke="rgba(51,255,51,0.4)" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
    </svg>`;
  } else {
    growthEl.innerHTML = '<div class="empty">No data yet</div>';
  }

  // COLLECTIONS
  const collCounts = {};
  plays.forEach(d => { (SC[d.show_identifier]||[]).forEach(c => { collCounts[c]=(collCounts[c]||0)+1; }); });
  const maxColl = Math.max(...Object.values(collCounts), 1);
  document.getElementById('collection-bars').innerHTML = Object.entries(COLLS).map(([id,name]) => {
    const c = collCounts[id]||0;
    return `<div class="collection-bar"><div class="coll-name">${name}</div><div class="coll-fill"><div class="coll-fill-inner" style="width:${maxColl>0?(c/maxColl)*100:0}%"></div></div><div class="coll-count">${c}</div></div>`;
  }).join('');

  // PEAK HOURS
  const hourCounts = new Array(24).fill(0);
  plays.forEach(d => {
    if (d.listened_date && d.listened_date.includes('T')) {
      const h = parseInt(d.listened_date.split('T')[1]?.split(':')[0] || '0');
      hourCounts[h]++;
    }
  });
  const maxHour = Math.max(...hourCounts, 1);
  document.getElementById('hours-chart').innerHTML = hourCounts.map((c,i) =>
    `<div class="hour-bar" style="height:${Math.max((c/maxHour)*100,1)}%" title="${i}:00 — ${c} plays"></div>`
  ).join('');

  // TOP SHOWS
  const showCounts = {}; const showMeta = {};
  plays.forEach(d => {
    const id = d.show_identifier||''; if (!id) return;
    showCounts[id]=(showCounts[id]||0)+1;
    if (!showMeta[id]) showMeta[id] = { date: d.show_date||'', venue: d.show_venue||'' };
  });
  const top = Object.entries(showCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const topEl = document.getElementById('top-shows');
  topEl.innerHTML = top.length === 0 ? '<div class="empty">No data yet</div>' :
    top.map(([id,c],i) => {
      const m = showMeta[id]||{};
      return `<div class="list-item"><span class="list-rank">${i+1}.</span><span class="list-name">${m.date?fmtDate(m.date):'?'}${m.venue?' — '+m.venue:''}</span><span class="list-val">${c}</span></div>`;
    }).join('');

  // RECENT
  const recent = plays.slice(0,10);
  document.getElementById('recent').innerHTML = recent.length === 0 ? '<div class="empty">No data yet</div>' :
    recent.map(d => `<div class="list-item"><span class="list-name">${d.show_date?fmtDate(d.show_date):'?'}${d.show_venue?' — '+d.show_venue:''}</span><span class="list-val" style="font-size:10px;color:#1a5a1a;">${d.listened_date?fmtDate(d.listened_date):''}</span></div>`).join('');

  document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

refresh();
setInterval(refresh, 60000);

// Announcement control
async function loadAnnouncement() {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/xlii_announcements?order=updated_at.desc&limit=1`, { headers: H });
    const data = await res.json();
    if (data && data.length > 0) {
      const ann = data[0];
      document.getElementById('ann-title').value = ann.title || '';
      document.getElementById('ann-message').value = ann.message || '';
      document.getElementById('ann-status').textContent = ann.active ? 'ACTIVE' : 'OFF';
      document.getElementById('ann-status').style.color = ann.active ? '#33ff33' : '#1a5a1a';
    }
  } catch(e) {}
}

async function toggleAnnouncement(activate) {
  const title = document.getElementById('ann-title').value.trim();
  const message = document.getElementById('ann-message').value.trim();

  if (activate && !message) {
    alert('Enter a message first');
    return;
  }

  const id = activate ? 'ann-' + Date.now() : 'default';
  const body = {
    id: id,
    title: title,
    message: message,
    active: activate,
    updated_at: new Date().toISOString()
  };

  try {
    // Deactivate all existing
    await fetch(`${SB_URL}/rest/v1/xlii_announcements?active=eq.true`, {
      method: 'PATCH',
      headers: { ...H, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ active: false })
    });

    if (activate) {
      // Insert new active announcement
      await fetch(`${SB_URL}/rest/v1/xlii_announcements`, {
        method: 'POST',
        headers: { ...H, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify(body)
      });
    }

    document.getElementById('ann-status').textContent = activate ? 'ACTIVE' : 'OFF';
    document.getElementById('ann-status').style.color = activate ? '#33ff33' : '#1a5a1a';
  } catch(e) {
    console.error('Announcement update failed:', e);
  }
}

loadAnnouncement();
